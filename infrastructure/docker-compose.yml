services:

  postgres:
    image: postgres:16
    container_name: notifyx-postgres
    environment:
      POSTGRES_DB: notifyx
      POSTGRES_USER: notifyx
      POSTGRES_PASSWORD: notifyx123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - notifyx-network


  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: notifyx-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - notifyx-network


  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: notifyx-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - notifyx-network


  redis:
    image: redis:7
    container_name: notifyx-redis
    ports:
      - "6379:6379"
    networks:
      - notifyx-network


volumes:
  postgres-data:


networks:
  notifyx-network: